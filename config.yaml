# ============================================================================
# config.yaml — 스윙 자동매매 시스템 설정
# ============================================================================
# 민감 정보(API키, 계좌번호 등)는 .env 파일에서 관리합니다.
# 이 파일은 git에 커밋되므로 비밀번호/토큰을 절대 포함하지 마세요.

# --- 종목 리스트 ---
# watchlist가 비어있으면 pre_screening + screening 2단계 동적 선별 모드로 동작
# watchlist에 종목이 있으면 해당 종목만 감시 (기존 고정 모드)
watchlist: []
# watchlist:
#   - "005930"   # 삼성전자
#   - "000660"   # SK하이닉스
#   - "005380"   # 현대차
#   (... 필요시 고정 종목 추가)

# --- 1차 Pre-Screening (장전 후보군 축소 필터) ---
# 시장 국면(regime)에 따라 조건식을 자동 선택
pre_screening:
  # 공통 필터
  min_market_cap: 100_000_000_000    # 시가총액 1000억원 이상
  volume_ratio_threshold: 1.5        # 당일 거래량 / 20일 평균 거래량 >= 150%

  # 조건식 1: 눌림목 (trending 국면용 — golden_cross/breakout 전략과 매칭)
  # 52주 고점 근처에서 조정 중이나 추세는 유지된 종목
  pullback:
    week52_high_min: -0.15           # 52주 최고가 대비 -15% 이상
    week52_high_max: 0.0             # 52주 최고가 대비 0% 이하
    rsi_min: 45                      # RSI(14) 하한
    rsi_max: 65                      # RSI(14) 상한
    disparity_sma20_min: 100         # 이격도(종가/SMA20) 하한 (%)
    disparity_sma20_max: 200         # 이격도(종가/SMA20) 상한 (%)
    disparity_sma60_min: 100         # 이격도(종가/SMA60) 하한 (%)
    disparity_sma60_max: 200         # 이격도(종가/SMA60) 상한 (%)

  # 조건식 2: 변동성 수축 (sideways 국면용 — bb_bounce 전략과 매칭)
  # 횡보 압축 후 방향성 출현 예상 종목 (평균회귀용 거래량 기준 완화)
  squeeze:
    price_range_period: 20           # 변동폭 측정 기간 (일)
    price_range_max: 0.15            # 최고최저폭 15% 이하 (변동성 수축)
    min_price: 3000                  # 최소 주가 (원)
    max_price: 200000                # 최대 주가 (원)
    volume_ratio_threshold: 0.8      # 거래량비율 (0.8x — 평균회귀는 거래량 급증 불필요)

# --- 매매 기본 설정 ---
# 모드 제어는 .env의 IS_PAPER_TRADING으로 관리 (True=모의, False=실거래)
trading:
  universe: kospi_kosdaq            # 매매 대상 시장 (kospi | kosdaq | kospi_kosdaq)
  max_positions: 8                  # 동시에 보유할 수 있는 최대 종목 수 (백테스트 최적: 30종목/8포지션)
  reentry_cooldown_days: 3          # 같은 종목을 매도 후 다시 매수하기까지 대기 영업일
  reentry_cooldown_trend_days: 1    # 추세 유지 시 (SMA5>SMA20, ADX>임계값) 단축 쿨다운
  initial_capital: 3_000_000        # 실거래/페이퍼 초기 자본금 (원)
  order_type: market                # 주문 호가 유형 (market: 시장가, limit: 지정가)
  entry_start_time: "09:30"         # 매수 진입 허용 시작 시각 (장 초반 변동성 회피)
  entry_end_time: "15:00"           # 매수 진입 허용 종료 시각 (동시호가 15:20~ 회피)

# --- 종목 스크리닝 (장 시작 전 후보 선별) ---
screening:
  min_daily_amount: 1_000_000_000   # 최소 일 거래대금 (원) — 10억 미만 종목 제외 (유동성 확보)
  min_market_cap: 30_000_000_000    # 최소 시가총액 (원) — 300억 미만 종목 제외 (소형주 제외)
  min_price: 1000                   # 최소 주가 (원) — 1,000원 미만 동전주 제외
  max_price: 500000                 # 최대 주가 (원) — 50만원 초과 고가주 제외
  top_n: 30                         # 스크리닝 결과 상위 N종목까지만 매수 후보로 선정 (백테스트 최적: 30종목/8포지션)

# --- 매매 전략 파라미터 ---
# 현재 전략: 골든크로스 변형 (SMA5/20 크로스 + RSI + ADX + 거래량)
strategy:
  type: adaptive                    # adaptive: 시장 국면별 자동 전환 | bb_bounce | golden_cross | macd_rsi | breakout
  # 국면별 전략 매핑 (type=adaptive 일 때만 사용)
  # 리스트 형식도 지원: 복수 전략 동시 활성화 (OR 로직)
  regime_strategy:
    trending:                          # 추세장 (ADX >= 25, KOSPI > 200일선)
      - golden_cross                   #   추세 시작 포착 (SMA5/20 크로스)
      - macd_pullback                  #   추세 중 눌림목 재진입 (MACD>Signal + RSI 반등)
      - volume_breakout                #   거래량 선행 돌파 (매집→가격 돌파 초기 포착)
    sideways: bb_bounce                # 횡보장 (ADX < 25, KOSPI > 200일선) — WF 검증 완료
    # bearish: 매수 차단 (MarketRegime 게이트)
  timeframe_primary: D              # 기본 분석 타임프레임 (D: 일봉)
  timeframe_entry: 60               # 진입 타이밍 타임프레임 (분봉, 60=60분봉)
  adx_threshold: 15                 # ADX 추세 강도 기준 (튜닝: 20→15, 약한 추세에서도 진입 허용)

  # 이동평균선 (Moving Average)
  macd_fast: 12                     # MACD 빠른선 기간 (기본 12일)
  macd_slow: 26                     # MACD 느린선 기간 (기본 26일)
  macd_signal: 9                    # MACD 시그널선 기간 (기본 9일)
  ma_trend: 20                      # 추세 판단용 이동평균 기간 (20일선)

  # RSI (Relative Strength Index, 상대강도지수)
  rsi_period: 14                    # RSI 계산 기간 (14일)
  rsi_entry_min: 35                 # 매수 허용 RSI 하한 (튜닝: 40→35, 진입 기회 확대)
  rsi_entry_max: 65                 # 매수 허용 RSI 상한 (65 초과면 과매수로 판단)

  # 볼린저밴드 (Bollinger Bands)
  bb_period: 20                     # 볼린저밴드 기간 (20일)
  bb_std: 2.0                       # 볼린저밴드 표준편차 배수 (2.0σ)
  bb_touch_pct: 0.15                # BB 하단 터치 범위 (튜닝: 0.10→0.15, BB 진입 확대)
  rsi_oversold: 45                  # BB 과매도 기준 (튜닝: 40→45, BB 진입 확대)
  rsi_pullback: 45                  # MACD Pullback 눌림 RSI 기준
  screening_lookback: 5             # 골든크로스 lookback 기간 (일)

  # 거래량 필터
  volume_multiplier: 1.0            # 20일 평균 거래량 대비 배수 (1.0 = 평균 이상이면 OK)

  # 거래량 돌파 전략 (volume_breakout) 파라미터
  vol_breakout_multiplier: 1.5      # N일 최대 거래량 대비 배수 (튜닝: 0.8→1.5, 강한 돌파만 허용)
  vol_lookback: 20                  # 거래량 돌파 기준 기간 (일)

  # 청산 조건
  max_hold_days: 10                 # 최대 보유 기간 (영업일) — 초과 시 강제 매도
  target_return: 0.10               # 목표 수익률 (0.10 = +10%) — 도달 시 자동 매도 (최적화: 0.12→0.10, 빠른 익절+승률 향상)

  # 부분 매도 설정
  partial_sell_enabled: true         # 부분 매도 활성화
  partial_target_pct: 0.5            # 목표가의 50% 도달 시 부분 매도 트리거
  partial_sell_ratio: 0.5            # 보유 수량의 50%를 매도

# --- 리스크 관리 ---
risk:
  # 포지션 사이징
  max_position_ratio: 0.15          # 종목당 최대 투자 비율 (총 자본의 15%)
  min_position_ratio: 0.03          # 종목당 최소 투자 비율 (총 자본의 3%)
  sizing_method: half_kelly         # 포지션 크기 결정 방식 (half_kelly | fixed)

  # 손절 (Stop Loss)
  stop_atr_multiplier: 1.5          # 초기 손절가 = 진입가 - ATR × 이 값 (최적화: 2.5→1.5, 빠른 손절)
  max_stop_pct: 0.07                # 최대 손절 비율 (0.07 = -7%) — 최적화: 0.10→0.07

  # 트레일링 스톱 (수익 보호)
  trailing_atr_multiplier: 2.0      # 트레일링 = 고점 - ATR × 이 값
  trailing_activate_pct: 0.10       # 트레일링 활성화 수익률 (최적화: 0.06→0.10, 조기 청산 방지)

  # 일일 손실 관리
  daily_loss_limit: -0.03           # 일일 손실 한도 (-0.03 = -3%) — 초과 시 당일 매매 중단
  daily_loss_warning: -0.02         # 일일 손실 경고 (-0.02 = -2%) — 텔레그램 경고 발송
  max_mdd: -0.20                    # 최대 낙폭 한도 (-0.20 = -20%) — 초과 시 전략 중단

# --- 백테스트 비용 모델 ---
backtest:
  commission: 0.00015               # 수수료 (0.015%, 매수/매도 각각 적용)
  tax: 0.002                        # 거래세 (0.2%, 매도 시에만 적용)
  slippage: 0.001                   # 슬리피지 (0.1%, 체결가 불리함 가정)
  initial_capital: 3_000_000        # 백테스트 초기 자본금 (원)

# --- 브로커 연결 설정 (키움 REST API) ---
# paper/live 모두 실전 서버 사용 (paper 모드는 주문만 시뮬레이션)
broker:
  type: rest                        # 키움 REST API
  base_url: "https://api.kiwoom.com"                              # REST API 기본 URL
  # ws_url 제거 — REST polling 모드 사용 (WebSocket은 다른 프로그램과 API 키 충돌)

# --- 스케줄러 (자동 작업 시간) ---
schedule:
  screening_time: "08:30"           # 장전 스크리닝 실행 시간 (08:30 → 장 시작 전 후보 선별)
  polling_start_time: "09:25"       # REST polling 시작 시간 (09:25 → 매수 진입 5분 전)
  polling_stop_time: "15:35"        # REST polling 종료 시간 (15:35 → 장 마감 5분 후)
  polling_interval: 30              # polling 간격 (초) — 일봉/60분봉 기반 스윙매매에 충분
  daily_report_time: "16:00"        # 일간 리포트 발송 시간 (16:00 → 장 마감 후 텔레그램 발송)
