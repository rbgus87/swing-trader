# ============================================================================
# config.yaml — 스윙 자동매매 시스템 설정
# ============================================================================
# 민감 정보(API키, 계좌번호 등)는 .env 파일에서 관리합니다.
# 이 파일은 git에 커밋되므로 비밀번호/토큰을 절대 포함하지 마세요.
#
# 갱신: 2026-04-30 (Phase 2 연장 v2.5)
# - 자본 1000만원, 4종목 동시 보유
# - 비용 모델: 왕복 0.31%
# - 단일 전략: TrendFollowing v2.5 (equity 균등 + TP2)


# ============================================================================
# TrendFollowing v2.5 전략 파라미터 (상태 기반 추세추종 + 시장별 상대강도 + TP2)
# ============================================================================
# 이 섹션이 백테스트 및 라이브 운용의 기준값.

trend_following:
  # 이동평균
  ma_short: 5
  ma_mid: 20
  ma_mid2: 60
  ma_long: 120                         # v2.2 신규
  # MA60 대비 위치
  ma60_position_min: 0.05              # v2.2 신규
  ma60_position_max: 0.20              # v2.2 신규
  ma60_slope_lookback: 5               # v2.2 신규

  # MACD
  macd_fast: 12                        # v2.2 신규
  macd_slow: 26                        # v2.2 신규
  macd_signal: 9                       # v2.2 신규

  # 상대강도 (vs KOSPI)
  relative_strength_period: 20         # v2.2 신규
  relative_strength_threshold: 0.05    # v2.2 신규 (+5%p)

  # 거래량
  vol_short: 5                         # v2.2 신규
  vol_long: 20

  # 공통
  adx_period: 14
  adx_threshold: 20
  atr_period: 14
  atr_price_min: 0.025                 # ATR 밴드 하한
  atr_price_max: 0.08                  # ATR 밴드 상한
  min_trading_value: 5_000_000_000     # 50억원

  # 청산 (v2.5 — TP1 30% + TP2 30% + 잔여 40% 트레일링)
  stop_loss_atr: 2.0
  take_profit_atr: 2.0
  trailing_atr: 4.0
  max_hold_days: 20
  tp1_sell_ratio: 0.3
  tp2_atr: 4.0                         # v2.5 신규 — TP2 발동 ATR 배수
  tp2_sell_ratio: 0.3                  # v2.5 신규 — TP2 매도 비율 (초기 수량 기준)

  # 사이징 모드 (v2.5 신규)
  # - "cash":   alloc = cash × (1 / max_positions)            (현행 v2.4)
  # - "equity": alloc = total_equity / max_positions  (균등 + 복리, v2.5)
  sizing_mode: equity

  # 비용 모델
  buy_commission: 0.00015              # 0.015%
  sell_commission: 0.00015             # 0.015%
  sell_tax: 0.0018                     # 0.18% (2026)
  slippage: 0.0005                     # 0.05%


# ============================================================================
# 매매 기본 설정
# ============================================================================

trading:
  universe: kospi_kosdaq
  max_positions: 4
  initial_capital: 50_000_000          # v2.5: 500만원
  reentry_cooldown_days: 3
  order_type: market
  entry_start_time: "09:30"
  entry_end_time: "15:00"


# ============================================================================
# 포트폴리오 / Universe Pool
# ============================================================================

universe_pool:
  min_market_cap: 3_000_000_000_000    # 시총 3조원 (fix2: 5조→3조 확대)
  min_trading_value: 5_000_000_000     # 거래대금 50억원
  refresh_interval_days: 60            # 분기별 재계산
  excluded_types:
    - SPAC
    - REIT
    - FOREIGN
    - PREFERRED


# ============================================================================
# 리스크 관리
# ============================================================================

risk:
  max_position_ratio: 0.30             # 종목당 최대 30% (4종목 기준 25% 균등 + 여유)
  min_position_amount: 1_000_000       # 종목당 최소 100만원
  daily_loss_limit: -0.03
  daily_loss_warning: -0.02
  max_mdd: -0.20


# ============================================================================
# 백테스트 비용 모델
# ============================================================================

backtest:
  commission: 0.00015                  # 0.015%
  tax: 0.0018                          # 0.18% (2026)
  slippage: 0.0005                     # 0.05%
  initial_capital: 10_000_000          # v2.5: 1000만원


# ============================================================================
# 브로커 설정 (키움 REST API)
# ============================================================================

broker:
  type: rest
  base_url: "https://api.kiwoom.com"
  ws_url: "wss://api.kiwoom.com:10000/api/dostk/websocket"


# ============================================================================
# 스케줄러
# ============================================================================

schedule:
  screening_time: "08:30"
  polling_start_time: "09:00"
  polling_stop_time: "15:35"
  polling_interval: 10
  daily_report_time: "16:00"
  reconnect_time: "08:45"


