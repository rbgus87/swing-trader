# config.yaml — 스윙 자동매매 시스템 설정
# 민감 정보(.env)는 이 파일에 포함하지 않음

trading:
  mode: paper                      # paper | live (실거래 시 live로 변경)
  universe: kospi_kosdaq
  max_positions: 5
  reentry_cooldown_days: 3

screening:
  min_daily_amount: 5_000_000_000  # 50억
  min_market_cap: 30_000_000_000   # 300억
  min_price: 1000
  max_price: 500000
  top_n: 30

strategy:
  timeframe_primary: D
  timeframe_entry: 60
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_period: 14
  rsi_entry_min: 40
  rsi_entry_max: 65
  bb_period: 20
  bb_std: 2.0
  volume_multiplier: 1.5
  ma_trend: 20
  max_hold_days: 20
  target_return: 0.10

risk:
  max_position_ratio: 0.15
  min_position_ratio: 0.03
  sizing_method: half_kelly        # half_kelly | fixed
  stop_atr_multiplier: 2.0
  max_stop_pct: 0.10
  trailing_atr_multiplier: 2.5
  trailing_activate_pct: 0.05
  daily_loss_limit: -0.03
  daily_loss_warning: -0.02
  max_mdd: -0.20

backtest:
  commission: 0.00015
  tax: 0.002
  slippage: 0.001
  initial_capital: 10_000_000

broker:
  type: rest
  base_url: "https://api.kiwoom.com"
  ws_url: "wss://api.kiwoom.com:10000/api/dostk/websocket"
  environment: paper

schedule:
  screening_time: "08:30"
  daily_report_time: "16:00"
  reconnect_time: "08:45"
