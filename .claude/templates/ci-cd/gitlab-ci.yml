# ============================================================
# STAGE: 빌드
# ============================================================
build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run build               # {{BUILD_COMMAND}}
  artifacts:
    paths:
      - dist/                     # {{BUILD_OUTPUT_DIR}}
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

