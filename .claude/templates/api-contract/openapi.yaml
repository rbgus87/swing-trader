# ====================================
# OpenAPI 3.0 스펙 템플릿
# Backend/Frontend 간 API 계약 정의
# ====================================
openapi: "3.0.3"

info:
  title: "{{PROJECT_NAME}} API"
  description: "{{PROJECT_DESCRIPTION}}"
  version: "0.1.0"
  contact:
    name: "Backend Team"

servers:
  - url: "http://localhost:3000/api"
    description: "로컬 개발"
  # - url: "https://api.example.com"
  #   description: "프로덕션"

paths:
  /health:
    get:
      summary: "헬스체크"
      operationId: "getHealth"
      tags: [System]
      responses:
        "200":
          description: "정상"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /auth/login:
    post:
      summary: "로그인"
      operationId: "login"
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "로그인 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ====================================
  # 리소스 CRUD 예시 (복사하여 확장)
  # ====================================
  /posts:
    get:
      summary: "게시글 목록 조회"
      operationId: "listPosts"
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: "목록 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
    post:
      summary: "게시글 생성"
      operationId: "createPost"
      tags: [Posts]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: "생성 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /posts/{id}:
    get:
      summary: "게시글 상세 조회"
      operationId: "getPost"
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: "조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  # ====================================
  # 보안 스킴
  # ====================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ====================================
  # 공통 파라미터
  # ====================================
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  # ====================================
  # 공통 응답
  # ====================================
  responses:
    BadRequest:
      description: "잘못된 요청"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: "인증 필요"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "리소스 없음"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ====================================
  # 스키마 정의
  # ====================================
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time

    CreatePostRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string

    Post:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        author:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Post"

    PostListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
